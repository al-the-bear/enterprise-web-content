<svg viewBox="0 0 1120 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Anatomy of a Tom application">
<title>Anatomy of a Tom application</title>
<desc>A Tom application is a Flutter client and a Dart server talking over a REST API, with its whole framework stack (tom_core_flutter, tom_flutter_ui, tom_core_server, tom_core_kernel, tom_basics) inside the application. Outside the application sit the database, external services, and the tom_uam authentication/authorization server.</desc>
<defs>
  <marker id="an-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#41576C"/></marker>
  <marker id="an-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0F7FB0"/></marker>
  <marker id="an-u" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#A02B93"/></marker>
  <style>
    .ttl{font-size:15px;font-weight:700;fill:#0E2841;letter-spacing:.04em;text-transform:uppercase}
    .h{font-size:15px;font-weight:700;fill:#fff}
    .hd{font-size:14px;font-weight:700;fill:#0E2841}
    .lbl{font-size:13px;font-weight:600;fill:#0E2841}
    .cap{font-size:11.5px;fill:#41576C}
    .capw{font-size:11.5px;fill:#B9CCDC}
    .fnd{font-size:12.5px;font-weight:700;fill:#fff;font-family:'JetBrains Mono',ui-monospace,monospace}
    .edge{stroke:#41576C;stroke-width:1.6;fill:none}
    .edgeC{stroke:#0F7FB0;stroke-width:1.8;fill:none}
    .edgeU{stroke:#A02B93;stroke-width:1.6;fill:none;stroke-dasharray:6 5}
  </style>
</defs>

<rect x="0" y="0" width="1120" height="420" rx="22" fill="#F4F8FB"/>

<!-- application box (everything framework is inside) -->
<rect x="30" y="56" width="700" height="346" rx="18" fill="#FFFFFF" stroke="#C9D8E4" stroke-width="1.6"/>
<text x="50" y="84" class="ttl">A Tom application</text>

<!-- client + server -->
<rect x="64" y="98" width="270" height="72" rx="14" fill="#0E2841"/>
<text x="84" y="126" class="h">Flutter client</text>
<text x="84" y="148" class="capw">UI · Flutter widgets</text>
<rect x="396" y="98" width="300" height="72" rx="14" fill="#0E2841"/>
<text x="416" y="126" class="h">Dart server</text>
<text x="416" y="148" class="capw">REST API endpoints</text>
<text x="365" y="116" text-anchor="middle" class="cap">REST API</text>
<path d="M334 138 L396 138" class="edgeC" marker-start="url(#an-c)" marker-end="url(#an-c)"/>

<!-- framework stack, all INSIDE the application -->
<rect x="64" y="200" width="130" height="42" rx="9" fill="#156082"/><text x="129" y="226" text-anchor="middle" class="fnd">tom_core_flutter</text>
<rect x="204" y="200" width="130" height="42" rx="9" fill="#156082"/><text x="269" y="226" text-anchor="middle" class="fnd">tom_flutter_ui</text>
<rect x="396" y="200" width="300" height="42" rx="9" fill="#156082"/><text x="546" y="226" text-anchor="middle" class="fnd">tom_core_server</text>
<rect x="64" y="270" width="632" height="42" rx="9" fill="#0F7FB0"/><text x="380" y="296" text-anchor="middle" class="fnd">tom_core_kernel</text>
<rect x="64" y="340" width="632" height="42" rx="9" fill="#1B4B70"/><text x="380" y="366" text-anchor="middle" class="fnd">tom_basics</text>

<!-- "relies on" dependency arrows (downward) -->
<path d="M129 170 L129 198" class="edge" marker-end="url(#an-a)"/>
<path d="M269 170 L269 198" class="edge" marker-end="url(#an-a)"/>
<path d="M546 170 L546 198" class="edge" marker-end="url(#an-a)"/>
<path d="M129 242 L129 268" class="edge" marker-end="url(#an-a)"/>
<path d="M269 242 L269 268" class="edge" marker-end="url(#an-a)"/>
<path d="M546 242 L546 268" class="edge" marker-end="url(#an-a)"/>
<path d="M380 312 L380 338" class="edge" marker-end="url(#an-a)"/>

<!-- OUTSIDE: tom_uam (top right) -->
<rect x="770" y="98" width="312" height="72" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="790" y="126" class="hd">tom_uam</text>
<text x="790" y="148" class="cap">authentication / authorization server</text>
<!-- server authorize -->
<path d="M696 134 L768 134" class="edgeU" marker-end="url(#an-u)"/>
<text x="732" y="126" text-anchor="middle" class="cap" fill="#7A2186">authorize</text>
<!-- client authenticate, routed cleanly above the boxes -->
<path d="M300 98 L300 42 L946 42 L946 96" class="edgeU" marker-end="url(#an-u)"/>
<text x="620" y="34" text-anchor="middle" class="cap" fill="#7A2186">authenticate</text>

<!-- OUTSIDE: external services (middle right) -->
<rect x="770" y="210" width="312" height="64" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="790" y="236" class="hd">External services</text>
<text x="790" y="256" class="cap">third-party APIs the server integrates</text>
<path d="M640 170 C 706 200 724 238 768 242" class="edge" marker-end="url(#an-a)"/>

<!-- OUTSIDE: database (bottom right) -->
<g>
  <path d="M842 304 a58 14 0 0 0 116 0 v52 a58 14 0 0 1 -116 0 z" fill="#E7F6EC" stroke="#9ED9AE"/>
  <ellipse cx="900" cy="304" rx="58" ry="14" fill="#C8EFD3" stroke="#9ED9AE"/>
  <text x="900" y="346" text-anchor="middle" class="lbl" fill="#1F7A2E">Database</text>
</g>
<path d="M662 170 C 742 262 800 296 842 312" class="edge" marker-end="url(#an-a)"/>
</svg>
