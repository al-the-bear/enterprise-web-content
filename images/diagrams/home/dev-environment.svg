<svg viewBox="0 0 1080 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="The Tom development environment">
<title>The development environment</title>
<desc>A manual specification seeds the creation flow (DocSpecs to CodeSpecs to Implementation). Tom Forge drives that flow: its DocSpec, CodeSpec and Implementation development surfaces point to the matching flow stages and all rely on a multi-role agent driver and tools with D4rt access. The driver reaches out to the LLM providers; Tom Brain can sit optionally between Tom Forge and the providers.</desc>
<defs>
  <marker id="de-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#41576C"/></marker>
  <marker id="de-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0F7FB0"/></marker>
  <style>
    .ttl{font-size:14px;font-weight:700;fill:#0E2841;letter-spacing:.04em;text-transform:uppercase}
    .ttlw{font-size:14px;font-weight:700;fill:#0E2841;letter-spacing:.04em;text-transform:uppercase}
    .h{font-size:14.5px;font-weight:700;fill:#0E2841}
    .hw{font-size:14.5px;font-weight:700;fill:#fff}
    .lbl{font-size:13px;font-weight:600;fill:#0E2841}
    .cap{font-size:11px;fill:#41576C}
    .capw{font-size:11px;fill:#B9CCDC}
    .muted{font-size:12.5px;font-weight:600;fill:#7B8D9C;font-style:italic}
    .edge{stroke:#41576C;stroke-width:1.6;fill:none}
    .edgeC{stroke:#0F7FB0;stroke-width:1.8;fill:none}
  </style>
</defs>

<rect x="0" y="0" width="1080" height="640" rx="22" fill="#F4F8FB"/>

<!-- manual specification, OUTSIDE the flow box -->
<rect x="40" y="44" width="220" height="56" rx="11" fill="#FFF7ED" stroke="#F3D6BE"/>
<text x="150" y="68" text-anchor="middle" class="h">Manual specification</text>
<text x="150" y="86" text-anchor="middle" class="cap">outside the pipeline</text>

<!-- creation flow box -->
<rect x="300" y="30" width="740" height="120" rx="14" fill="#EEF2F6" stroke="#D7E1EA"/>
<text x="320" y="56" class="ttl">Creation flow</text>
<rect x="330" y="72" width="200" height="54" rx="10" fill="#fff" stroke="#C9D8E4"/><text x="430" y="104" text-anchor="middle" class="h">DocSpecs</text>
<rect x="560" y="72" width="200" height="54" rx="10" fill="#fff" stroke="#C9D8E4"/><text x="660" y="104" text-anchor="middle" class="h">CodeSpecs</text>
<rect x="790" y="72" width="220" height="54" rx="10" fill="#fff" stroke="#C9D8E4"/><text x="900" y="104" text-anchor="middle" class="h">Implementation</text>
<path d="M530 99 L558 99" class="edge" marker-end="url(#de-a)"/>
<path d="M760 99 L788 99" class="edge" marker-end="url(#de-a)"/>
<!-- manual spec -> docspecs -->
<path d="M260 78 C 292 78 300 99 328 99" class="edge" marker-end="url(#de-a)"/>

<!-- tom forge box -->
<rect x="300" y="226" width="740" height="252" rx="14" fill="#EAF4FA" stroke="#BFD9EA"/>
<text x="320" y="252" class="ttl">Tom Forge</text>

<!-- forge development surfaces -->
<rect x="330" y="268" width="200" height="60" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="430" y="294" text-anchor="middle" class="lbl">DocSpec</text><text x="430" y="312" text-anchor="middle" class="lbl">development</text>
<rect x="560" y="268" width="200" height="60" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="660" y="294" text-anchor="middle" class="lbl">CodeSpec</text><text x="660" y="312" text-anchor="middle" class="lbl">development</text>
<rect x="790" y="268" width="220" height="60" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="900" y="302" text-anchor="middle" class="lbl">Implementation</text>

<!-- forge surfaces point UP to the matching flow stages -->
<path d="M430 268 L430 128" class="edgeC" marker-end="url(#de-c)"/>
<path d="M660 268 L660 128" class="edgeC" marker-end="url(#de-c)"/>
<path d="M900 268 L900 128" class="edgeC" marker-end="url(#de-c)"/>

<!-- multi-role agent driver (the three surfaces rely on it) -->
<rect x="330" y="392" width="680" height="66" rx="12" fill="#156082"/>
<text x="670" y="420" text-anchor="middle" class="hw">Multi-role agent driver &amp; tools</text>
<text x="670" y="440" text-anchor="middle" class="capw">with D4rt access</text>
<path d="M430 328 L430 390" class="edge" marker-end="url(#de-a)"/>
<path d="M660 328 L660 390" class="edge" marker-end="url(#de-a)"/>
<path d="M900 328 L900 390" class="edge" marker-end="url(#de-a)"/>

<!-- tom brain, OPTIONAL, between forge and providers -->
<rect x="560" y="500" width="220" height="42" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-dasharray="6 4"/>
<text x="670" y="526" text-anchor="middle" class="muted">Tom Brain · optional</text>
<path d="M670 458 L670 498" class="edge" marker-end="url(#de-a)"/>

<!-- llm providers, OUTSIDE the forge box -->
<rect x="440" y="566" width="460" height="48" rx="11" fill="#fff" stroke="#D7E1EA"/>
<text x="670" y="595" text-anchor="middle" class="h">LLM providers</text>
<path d="M670 542 L670 564" class="edge" marker-end="url(#de-a)"/>
</svg>
