<svg viewBox="0 0 1120 700" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="DocSpec and CodeSpec driven development">
<title>DocSpec/CodeSpec-driven development</title>
<desc>A free-form specification becomes a project definition, which fans out into detailed sub-documents (UI, Server API, Object model, Data model, and more as needed). Each sub-document drives a matching CodeSpec (UI/forms, abstract API definition, abstract object-model classes, data-model classes), and each CodeSpec generates the corresponding part of the running application (UI, Server API, Object model, Data model).</desc>
<defs>
  <marker id="dc-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#41576C"/></marker>
  <style>
    .ttl{font-size:14px;font-weight:700;fill:#0E2841;letter-spacing:.04em;text-transform:uppercase}
    .h{font-size:15px;font-weight:700;fill:#0E2841}
    .hw{font-size:14px;font-weight:700;fill:#fff}
    .lbl{font-size:12.5px;font-weight:600;fill:#0E2841}
    .lblw{font-size:12.5px;font-weight:600;fill:#fff}
    .cap{font-size:11px;fill:#41576C}
    .muted{font-size:12px;font-weight:600;fill:#7B8D9C;font-style:italic}
    .edge{stroke:#41576C;stroke-width:1.5;fill:none}
  </style>
</defs>

<rect x="0" y="0" width="1120" height="700" rx="22" fill="#F4F8FB"/>

<!-- 1. free-form specification -->
<rect x="430" y="26" width="260" height="50" rx="11" fill="#FFF7ED" stroke="#F3D6BE"/>
<text x="560" y="48" text-anchor="middle" class="h">Free-form specification</text>
<text x="560" y="66" text-anchor="middle" class="cap">human intent, unstructured</text>
<path d="M560 76 L560 100" class="edge" marker-end="url(#dc-a)"/>

<!-- 2. project definition -->
<rect x="400" y="102" width="320" height="54" rx="11" fill="#FFF7ED" stroke="#F3D6BE"/>
<text x="560" y="125" text-anchor="middle" class="h">Project definition</text>
<text x="560" y="144" text-anchor="middle" class="cap">the initial, whole-application specification</text>

<!-- 3. detailed sub-documents -->
<rect x="36" y="196" width="1048" height="118" rx="14" fill="#EAF4FA" stroke="#CFE6F2"/>
<text x="56" y="222" class="ttl">Detailed sub-documents</text>
<rect x="56"  y="238" width="186" height="56" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="149" y="262" text-anchor="middle" class="lbl">UI</text><text x="149" y="280" text-anchor="middle" class="cap">screens &amp; flows</text>
<rect x="261" y="238" width="186" height="56" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="354" y="262" text-anchor="middle" class="lbl">Server API</text><text x="354" y="280" text-anchor="middle" class="cap">endpoints</text>
<rect x="466" y="238" width="186" height="56" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="559" y="262" text-anchor="middle" class="lbl">Object model</text><text x="559" y="280" text-anchor="middle" class="cap">domain types</text>
<rect x="671" y="238" width="186" height="56" rx="10" fill="#fff" stroke="#BFD9EA"/><text x="764" y="262" text-anchor="middle" class="lbl">Data model</text><text x="764" y="280" text-anchor="middle" class="cap">persistence</text>
<rect x="876" y="238" width="186" height="56" rx="10" fill="#fff" stroke="#CFE6F2" stroke-dasharray="5 4"/><text x="969" y="262" text-anchor="middle" class="muted">… more as needed</text>

<!-- project definition -> each sub-document -->
<path d="M540 156 C 360 174 200 196 149 236" class="edge" marker-end="url(#dc-a)"/>
<path d="M548 156 C 470 178 380 200 354 236" class="edge" marker-end="url(#dc-a)"/>
<path d="M560 156 L559 236" class="edge" marker-end="url(#dc-a)"/>
<path d="M572 156 C 650 178 740 200 764 236" class="edge" marker-end="url(#dc-a)"/>
<path d="M580 156 C 760 174 920 196 969 236" class="edge" marker-end="url(#dc-a)"/>

<!-- 4. codespecs -->
<rect x="36" y="370" width="841" height="120" rx="14" fill="#F3ECF7" stroke="#DDC9E8"/>
<text x="56" y="396" class="ttl">CodeSpecs</text>
<rect x="56"  y="412" width="186" height="58" rx="10" fill="#fff" stroke="#C9B6D8"/><text x="149" y="437" text-anchor="middle" class="lbl">UI / forms</text><text x="149" y="455" text-anchor="middle" class="cap">declarative UI specs</text>
<rect x="261" y="412" width="186" height="58" rx="10" fill="#fff" stroke="#C9B6D8"/><text x="354" y="437" text-anchor="middle" class="lbl">Abstract API</text><text x="354" y="455" text-anchor="middle" class="cap">interface definition</text>
<rect x="466" y="412" width="186" height="58" rx="10" fill="#fff" stroke="#C9B6D8"/><text x="559" y="437" text-anchor="middle" class="lbl">Object-model classes</text><text x="559" y="455" text-anchor="middle" class="cap">abstract domain types</text>
<rect x="671" y="412" width="186" height="58" rx="10" fill="#fff" stroke="#C9B6D8"/><text x="764" y="437" text-anchor="middle" class="lbl">Data-model classes</text><text x="764" y="455" text-anchor="middle" class="cap">persistence classes</text>

<!-- sub-document -> matching codespec (the "… more" has none) -->
<path d="M149 294 L149 410" class="edge" marker-end="url(#dc-a)"/>
<path d="M354 294 L354 410" class="edge" marker-end="url(#dc-a)"/>
<path d="M559 294 L559 410" class="edge" marker-end="url(#dc-a)"/>
<path d="M764 294 L764 410" class="edge" marker-end="url(#dc-a)"/>

<!-- 5. application -->
<rect x="36" y="546" width="841" height="120" rx="14" fill="#EEF2F6" stroke="#D7E1EA"/>
<text x="56" y="572" class="ttl">Application</text>
<rect x="56"  y="588" width="186" height="58" rx="10" fill="#0E2841"/><text x="149" y="623" text-anchor="middle" class="hw">UI</text>
<rect x="261" y="588" width="186" height="58" rx="10" fill="#0E2841"/><text x="354" y="623" text-anchor="middle" class="hw">Server API</text>
<rect x="466" y="588" width="186" height="58" rx="10" fill="#0E2841"/><text x="559" y="623" text-anchor="middle" class="hw">Object model</text>
<rect x="671" y="588" width="186" height="58" rx="10" fill="#0E2841"/><text x="764" y="623" text-anchor="middle" class="hw">Data model</text>

<!-- codespec -> generated application part -->
<path d="M149 470 L149 586" class="edge" marker-end="url(#dc-a)"/>
<path d="M354 470 L354 586" class="edge" marker-end="url(#dc-a)"/>
<path d="M559 470 L559 586" class="edge" marker-end="url(#dc-a)"/>
<path d="M764 470 L764 586" class="edge" marker-end="url(#dc-a)"/>

<!-- generates caption -->
<text x="980" y="516" text-anchor="middle" class="cap" fill="#0B6E97">each CodeSpec generates</text>
<text x="980" y="532" text-anchor="middle" class="cap" fill="#0B6E97">its part of the app ↓</text>
</svg>
