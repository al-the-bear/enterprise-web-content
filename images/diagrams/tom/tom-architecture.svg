<svg viewBox="0 0 1300 940" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Anatomy of a Tom application and how the modules work together">
<title>Anatomy of a Tom application</title>
<desc>A Tom app is a Flutter client and a Dart server over a typed interface, on the tom_core foundation, with external services and an internal database; produced by the manual→DocSpec→CodeSpec→implementation flow driven by ai_build (tom_flow + tom_brain on tom_d4rt, base tom_reflection); cross-cutting features enforced by Tom Core; companion apps tom_uam and tom_sqm; parallel tooling and operations.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#41576C"/></marker>
  <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0F7FB0"/></marker>
  <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#A02B93"/></marker>
  <style>
    .ttl{font-size:15px;font-weight:700;fill:#0E2841;letter-spacing:.04em;text-transform:uppercase}
    .h{font-size:15px;font-weight:700;fill:#fff}
    .hd{font-size:14px;font-weight:700;fill:#0E2841}
    .lbl{font-size:13px;font-weight:600;fill:#0E2841}
    .lblw{font-size:13px;font-weight:700;fill:#fff}
    .cap{font-size:11.5px;fill:#41576C}
    .capw{font-size:11px;fill:#B9CCDC}
    .mono{font-size:11px;font-family:'JetBrains Mono',ui-monospace,monospace;fill:#7B8D9C}
    .monow{font-size:11px;font-family:'JetBrains Mono',ui-monospace,monospace;fill:#9FB6C9}
    .edge{stroke:#41576C;stroke-width:1.6;fill:none}
    .edgeC{stroke:#0F7FB0;stroke-width:1.8;fill:none}
    .edgeP{stroke:#A02B93;stroke-width:1.8;fill:none;stroke-dasharray:6 5}
  </style>
</defs>

<rect x="0" y="0" width="1300" height="940" rx="22" fill="#F4F8FB"/>

<!-- ===== CROSS-CUTTING RIBBON ===== -->
<rect x="300" y="34" width="828" height="46" rx="12" fill="#E6F4FB" stroke="#BFE0F1"/>
<text x="320" y="55" class="hd">Enforced by Tom&#160;Core</text>
<text x="320" y="72" class="cap">UI&#160;via&#160;resources · internationalization · authentication · authorization · uniform&#160;architecture · uniform&#160;deploy/ops</text>
<text x="1112" y="63" text-anchor="end" class="mono">independent of AI logic</text>

<!-- ===== CREATION FLOW (left) ===== -->
<text x="40" y="120" class="ttl">Application creation flow</text>
<g>
  <rect x="40" y="135" width="210" height="44" rx="10" fill="#fff" stroke="#D7E1EA"/>
  <text x="56" y="153" class="lbl">Manual specification</text><text x="56" y="170" class="cap">human intent</text>
  <line x1="145" y1="179" x2="145" y2="197" class="edge" marker-end="url(#arr)"/>
  <rect x="40" y="199" width="210" height="44" rx="10" fill="#fff" stroke="#D7E1EA"/>
  <text x="56" y="217" class="lbl">DocSpec specification</text><text x="56" y="234" class="mono">tom_doc_specs</text>
  <line x1="145" y1="243" x2="145" y2="261" class="edge" marker-end="url(#arr)"/>
  <rect x="40" y="263" width="210" height="46" rx="10" fill="#fff" stroke="#D7E1EA"/>
  <text x="56" y="281" class="lbl">CodeSpec</text><text x="56" y="298" class="cap">abstract app interface · tom_code_specs</text>
  <line x1="145" y1="309" x2="145" y2="327" class="edge" marker-end="url(#arr)"/>
  <rect x="40" y="329" width="210" height="44" rx="10" fill="#0E2841"/>
  <text x="56" y="347" class="lblw">Implementation</text><text x="56" y="364" class="capw">the running app's logic</text>
</g>
<!-- ai_build bracket -->
<path d="M262 135 q10 0 10 12 v95 q0 12 12 12 q-12 0 -12 12 v95 q0 12 -10 12" fill="none" stroke="#E97132" stroke-width="2"/>
<text x="280" y="258" class="lbl" fill="#B6541C">ai_build</text>
<text x="280" y="275" class="cap">drives the flow</text>
<!-- flow engine note -->
<rect x="40" y="392" width="232" height="74" rx="10" fill="#FEF6EF" stroke="#F3D6BE"/>
<text x="54" y="411" class="cap">scripts on <tspan font-family="JetBrains Mono,monospace">tom_flow</tspan></text>
<text x="54" y="429" class="cap">AI via <tspan font-family="JetBrains Mono,monospace">tom_brain</tspan> (external interface)</text>
<text x="54" y="447" class="cap">both execute on <tspan font-family="JetBrains Mono,monospace">tom_d4rt</tspan></text>
<text x="54" y="463" class="cap">base: <tspan font-family="JetBrains Mono,monospace">tom_reflection</tspan> — runtime assembly</text>
<!-- arrow: implementation -> app -->
<path d="M250 351 C 300 351 300 245 348 245" class="edgeC" marker-end="url(#arrC)"/>
<text x="300" y="330" class="cap" fill="#0B6E97">generates business logic →</text>

<!-- ===== THE APPLICATION (center) ===== -->
<text x="348" y="120" class="ttl">A Tom application</text>
<!-- client -->
<rect x="348" y="135" width="216" height="92" rx="14" fill="#0E2841"/>
<text x="364" y="160" class="h">Client app</text>
<text x="364" y="180" class="capw">Flutter</text>
<text x="364" y="216" class="monow">on tom_core_flutter</text>
<!-- interface -->
<rect x="584" y="158" width="120" height="46" rx="10" fill="#fff" stroke="#0F9ED5" stroke-width="1.6"/>
<text x="644" y="178" text-anchor="middle" class="lbl">Interface</text>
<text x="644" y="195" text-anchor="middle" class="cap">typed contract</text>
<line x1="564" y1="181" x2="582" y2="181" class="edgeC"/>
<path d="M584 196 L706 196" class="edgeC" marker-start="url(#arrC)" marker-end="url(#arrC)"/>
<line x1="706" y1="181" x2="724" y2="181" class="edgeC"/>
<!-- server -->
<rect x="724" y="135" width="216" height="92" rx="14" fill="#0E2841"/>
<text x="740" y="160" class="h">Server app</text>
<text x="740" y="180" class="capw">Dart · Shelf</text>
<text x="740" y="216" class="monow">on tom_core_server</text>

<!-- external services + DB (right) -->
<rect x="982" y="132" width="276" height="64" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="998" y="153" class="hd">External services</text>
<text x="998" y="172" class="cap">third-party APIs · one of them can be</text>
<text x="998" y="188" class="cap" fill="#7A2186"><tspan font-family="JetBrains Mono,monospace">tom_brain</tspan> (agentic)</text>
<path d="M940 165 L980 165" class="edge" marker-end="url(#arr)"/>
<!-- DB cylinder -->
<g>
  <path d="M1060 250 a60 14 0 0 0 120 0 v66 a60 14 0 0 1 -120 0 z" fill="#E7F6EC" stroke="#9ED9AE"/>
  <ellipse cx="1120" cy="250" rx="60" ry="14" fill="#C8EFD3" stroke="#9ED9AE"/>
  <text x="1120" y="292" text-anchor="middle" class="lbl" fill="#1F7A2E">Internal DB</text>
  <text x="1120" y="309" text-anchor="middle" class="cap">MySQL / PostgreSQL</text>
</g>
<path d="M880 227 C 1010 280 1010 255 1058 268" class="edge" marker-end="url(#arr)"/>

<!-- ===== FOUNDATION ===== -->
<rect x="348" y="247" width="216" height="40" rx="9" fill="#156082"/><text x="456" y="272" text-anchor="middle" class="lblw">tom_core_flutter</text>
<rect x="724" y="247" width="216" height="40" rx="9" fill="#156082"/><text x="832" y="272" text-anchor="middle" class="lblw">tom_core_server</text>
<rect x="348" y="295" width="592" height="38" rx="9" fill="#0F7FB0"/><text x="644" y="319" text-anchor="middle" class="lblw">tom_core_kernel</text>
<rect x="348" y="341" width="592" height="36" rx="9" fill="#1B4B70"/><text x="644" y="364" text-anchor="middle" class="lblw">tom_basics</text>
<text x="956" y="312" class="cap">shared</text><text x="956" y="327" class="cap">foundation</text>

<!-- companion apps -->
<text x="348" y="408" class="ttl">Companion apps · on Tom&#160;Core</text>
<rect x="348" y="420" width="288" height="50" rx="11" fill="#fff" stroke="#D7E1EA"/>
<text x="364" y="441" class="lbl">tom_uam</text><text x="364" y="459" class="cap">user &amp; authorization management</text>
<rect x="652" y="420" width="288" height="50" rx="11" fill="#fff" stroke="#D7E1EA"/>
<text x="668" y="441" class="lbl">tom_sqm</text><text x="668" y="459" class="cap">subscription &amp; quota management</text>

<!-- agentic additive line -->
<path d="M1120 196 C 1120 360 560 300 470 234" class="edgeP" marker-end="url(#arrP)"/>
<text x="700" y="262" class="cap" fill="#7A2186">additive: agentic apps run in the client via <tspan font-family="JetBrains Mono,monospace">tom_d4rt_flutter</tspan></text>

<!-- ===== TOOLING & OPERATIONS ===== -->
<text x="40" y="540" class="ttl">Tooling &amp; operations · parallel</text>
<g>
  <rect x="40" y="552" width="196" height="64" rx="11" fill="#fff" stroke="#D7E1EA"/><text x="56" y="574" class="lbl">VS Code extension</text><text x="56" y="592" class="cap">framework development</text><text x="56" y="608" class="mono">vscode_extension</text>
  <rect x="248" y="552" width="196" height="64" rx="11" fill="#fff" stroke="#D7E1EA"/><text x="264" y="574" class="lbl">DevOps CLI</text><text x="264" y="592" class="cap">build &amp; deployment tools</text><text x="264" y="608" class="mono">devops</text>
  <rect x="456" y="552" width="196" height="64" rx="11" fill="#fff" stroke="#D7E1EA"/><text x="472" y="574" class="lbl">Cloud</text><text x="472" y="592" class="cap">operations &amp; provisioning</text><text x="472" y="608" class="mono">tom_provisioning</text>
  <rect x="664" y="552" width="196" height="64" rx="11" fill="#fff" stroke="#D7E1EA"/><text x="680" y="574" class="lbl">Tom Forge</text><text x="680" y="592" class="cap">GUI tools / IDE</text><text x="680" y="608" class="mono">tom_forge</text>
  <rect x="872" y="552" width="186" height="64" rx="11" fill="#F1EFE8" stroke="#D3D1C7"/><text x="888" y="574" class="lbl" fill="#5F5E5A">Distributed</text><text x="888" y="592" class="cap">work coordination</text><text x="888" y="608" class="mono">not used yet</text>
  <rect x="1070" y="552" width="188" height="64" rx="11" fill="#F1EFE8" stroke="#D3D1C7"/><text x="1086" y="574" class="lbl" fill="#5F5E5A">Worktracker</text><text x="1086" y="592" class="cap">workspace todos</text><text x="1086" y="608" class="mono">work in progress</text>
</g>

<!-- standalone apps -->
<rect x="40" y="640" width="1218" height="54" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="56" y="662" class="hd">Standalone applications</text>
<text x="56" y="681" class="cap">extend existing open-source apps; whether they use Tom components is still undecided —
<tspan font-family="JetBrains Mono,monospace" fill="#7B8D9C">app_deepwork</tspan> · <tspan font-family="JetBrains Mono,monospace" fill="#7B8D9C">app_tompass</tspan> · <tspan font-family="JetBrains Mono,monospace" fill="#7B8D9C">app_webwork</tspan></text>

<!-- ===== LEGEND ===== -->
<g transform="translate(40,716)">
  <text x="0" y="0" class="hd">Legend</text>
  <line x1="0" y1="20" x2="34" y2="20" class="edge" marker-end="url(#arr)"/><text x="42" y="24" class="cap">uses / depends on</text>
  <line x1="200" y1="20" x2="234" y2="20" class="edgeC" marker-end="url(#arrC)"/><text x="242" y="24" class="cap">produces / data path</text>
  <line x1="420" y1="20" x2="454" y2="20" class="edgeP" marker-end="url(#arrP)"/><text x="462" y="24" class="cap">alternative / additive (agentic line)</text>
  <rect x="700" y="12" width="16" height="16" rx="4" fill="#0E2841"/><text x="724" y="24" class="cap">application</text>
  <rect x="820" y="12" width="16" height="16" rx="4" fill="#156082"/><text x="844" y="24" class="cap">tom_core foundation</text>
  <rect x="990" y="12" width="16" height="16" rx="4" fill="#F1EFE8" stroke="#D3D1C7"/><text x="1014" y="24" class="cap">present but unused / WIP</text>
</g>
</svg>
