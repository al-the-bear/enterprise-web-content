<svg viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="The D4rt component: two interpreter lines over one bridge API, with generators, Flutter bridges and REPLs">
<title>D4rt — interpreter family</title>
<desc>D4rt has an analyzer-based reference interpreter (tom_d4rt) and an analyzer-free line (tom_ast_model, tom_ast_generator, tom_d4rt_ast, tom_d4rt_exec) sharing one bridge API; around them sit the bridge generator, Flutter bridges and DCli REPLs.</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#41576C"/></marker>
  <style>
    .h{font-size:14px;font-weight:700;fill:#0E2841}
    .lblw{font-size:13px;font-weight:700;fill:#fff}
    .lbl{font-size:13px;font-weight:600;fill:#0E2841}
    .cap{font-size:11px;fill:#41576C}
    .mono{font-size:11px;font-family:'JetBrains Mono',ui-monospace,monospace;fill:#9FB6C9}
    .ttl{font-size:12px;font-weight:700;fill:#41576C;letter-spacing:.06em;text-transform:uppercase}
    .edge{stroke:#41576C;stroke-width:1.6;fill:none}
  </style>
</defs>

<rect x="0" y="0" width="1040" height="540" rx="18" fill="#F4F8FB"/>

<!-- shared bridge API band -->
<rect x="300" y="250" width="440" height="40" rx="10" fill="#0F9ED5"/>
<text x="520" y="275" text-anchor="middle" class="lblw">Shared bridge API — native ⇄ script</text>

<!-- LEFT: analyzer-based line -->
<text x="60" y="40" class="ttl">Analyzer-based line</text>
<rect x="60" y="54" width="300" height="78" rx="14" fill="#0E2841"/>
<text x="78" y="80" class="lblw">tom_d4rt</text>
<text x="78" y="100" class="cap" fill="#86E0A2">released · foundation</text>
<text x="78" y="120" class="mono">runtime Dart interpreter + sandbox</text>
<line x1="210" y1="132" x2="210" y2="248" class="edge" marker-end="url(#a)"/>

<!-- RIGHT: analyzer-free line -->
<text x="600" y="40" class="ttl">Analyzer-free line — parse on build, run on device</text>
<g>
  <rect x="600" y="54" width="180" height="44" rx="10" fill="#156082"/><text x="690" y="81" text-anchor="middle" class="lblw">tom_ast_model</text>
  <rect x="800" y="54" width="180" height="44" rx="10" fill="#156082"/><text x="890" y="81" text-anchor="middle" class="lblw">tom_ast_generator</text>
  <rect x="600" y="120" width="180" height="44" rx="10" fill="#0E2841"/><text x="690" y="147" text-anchor="middle" class="lblw">tom_d4rt_ast</text>
  <rect x="800" y="120" width="180" height="44" rx="10" fill="#0E2841"/><text x="890" y="147" text-anchor="middle" class="lblw">tom_d4rt_exec</text>
  <line x1="780" y1="76" x2="798" y2="76" class="edge" marker-end="url(#a)"/>
  <line x1="690" y1="98" x2="690" y2="118" class="edge" marker-end="url(#a)"/>
  <line x1="780" y1="142" x2="798" y2="142" class="edge" marker-end="url(#a)"/>
  <line x1="690" y1="164" x2="690" y2="248" class="edge" marker-end="url(#a)"/>
</g>

<!-- BOTTOM: around the interpreters -->
<text x="60" y="340" class="ttl">Around the interpreters</text>
<rect x="60" y="354" width="280" height="70" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="78" y="378" class="lbl">tom_d4rt_generator</text><text x="78" y="396" class="cap">bridge code generator —</text><text x="78" y="412" class="cap">exposes native APIs to scripts</text>
<rect x="380" y="354" width="300" height="70" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="398" y="378" class="lbl">tom_d4rt_flutter · _flutter_ast</text><text x="398" y="396" class="cap">Flutter bridges — over-the-air UI</text><text x="398" y="412" class="cap">(analyzer / analyzer-free)</text>
<rect x="720" y="354" width="260" height="70" rx="12" fill="#fff" stroke="#D7E1EA"/>
<text x="738" y="378" class="lbl">tom_d4rt_dcli · tom_dcli_exec</text><text x="738" y="396" class="cap">DCli REPLs — shell-style</text><text x="738" y="412" class="cap">scripting against the interpreter</text>

<line x1="200" y1="290" x2="200" y2="352" class="edge" marker-end="url(#a)"/>
<line x1="520" y1="290" x2="520" y2="352" class="edge" marker-end="url(#a)"/>
<line x1="840" y1="290" x2="840" y2="352" class="edge" marker-end="url(#a)"/>

<text x="60" y="470" class="cap">Both interpreter lines expose the same bridge API, so generators, Flutter bridges and REPLs work against either.</text>
</svg>
