<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tom framework abstract bear logo">
  <defs>
    <linearGradient id="tomFace" x1="32" y1="28" x2="128" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F9ED5"/>
      <stop offset="0.55" stop-color="#156082"/>
      <stop offset="1" stop-color="#0E2841"/>
    </linearGradient>
    <linearGradient id="tomEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F9ED5"/>
      <stop offset="1" stop-color="#156082"/>
    </linearGradient>
    <radialGradient id="tomSpark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7FE3A0"/>
      <stop offset="1" stop-color="#4EA72E"/>
    </radialGradient>
  </defs>

  <!-- ears -->
  <circle cx="44" cy="42" r="22" fill="url(#tomEar)"/>
  <circle cx="116" cy="42" r="22" fill="url(#tomEar)"/>
  <circle cx="44" cy="42" r="9" fill="#0E2841" opacity="0.35"/>
  <circle cx="116" cy="42" r="9" fill="#0E2841" opacity="0.35"/>

  <!-- face: rounded geometric form -->
  <rect x="26" y="40" width="108" height="104" rx="46" fill="url(#tomFace)"/>

  <!-- eyes -->
  <circle cx="62" cy="86" r="7.5" fill="#EAF6FB"/>
  <circle cx="98" cy="86" r="7.5" fill="#EAF6FB"/>
  <circle cx="63.5" cy="87" r="3.2" fill="#0E2841"/>
  <circle cx="99.5" cy="87" r="3.2" fill="#0E2841"/>

  <!-- muzzle -->
  <rect x="60" y="104" width="40" height="30" rx="15" fill="#EAF6FB" opacity="0.92"/>
  <path d="M80 112 v8 M80 120 q-6 5 -12 4 M80 120 q6 5 12 4" stroke="#0E2841" stroke-width="3.4" stroke-linecap="round" fill="none"/>
  <ellipse cx="80" cy="112" rx="6.5" ry="4.5" fill="#0E2841"/>

  <!-- dot-matrix spark: the "released / lit-up" motif -->
  <g>
    <circle cx="128" cy="118" r="5" fill="url(#tomSpark)"/>
    <circle cx="140" cy="110" r="3" fill="#4EA72E" opacity="0.8"/>
    <circle cx="139" cy="124" r="2.4" fill="#0F9ED5" opacity="0.7"/>
  </g>
</svg>
